# =============================================================================
# Production stack — runs the API + worker containers. Postgres, Mongo, Redis,
# Meilisearch, and object storage are managed externally (separate compose
# stacks or managed services). SWAG terminates TLS at the edge.
# =============================================================================

services:
  api:
    image: ${API_IMAGE:-ghcr.io/mgm-laboratory/mgm-asset-library-backend:prod-latest}
    env_file: .env
    environment:
      PROCESS_ROLE: api
    ports:
      - "${PORT:-4000}:4000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${PORT:-4000}/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    image: ${WORKER_IMAGE:-ghcr.io/mgm-laboratory/mgm-asset-library-worker:prod-latest}
    env_file: .env
    environment:
      PROCESS_ROLE: worker
      PORT: "4001"
    ports:
      - "4001:4001"
    restart: unless-stopped
    tmpfs:
      - /tmp/mgm-analyze:size=4g
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4001/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
