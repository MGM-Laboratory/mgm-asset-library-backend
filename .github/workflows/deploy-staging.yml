name: Deploy — staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "image_tag=ghcr.io/${{ github.repository }}:staging-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ github.repository }}:staging-latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to staging host
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /srv/mgm-asset-library-backend
            export IMAGE="${{ needs.build-and-push.outputs.image_tag }}"
            echo "$IMAGE" > .image-tag
            docker compose -f docker-compose.prod.yml pull
            # Apply migrations before swapping traffic.
            docker run --rm --env-file .env "$IMAGE" pnpm prisma migrate deploy
            docker compose -f docker-compose.prod.yml up -d
