name: CI

on:
  pull_request:
    branches: [staging, production]
  push:
    branches: [staging, production]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mgm
          POSTGRES_PASSWORD: mgm
          POSTGRES_DB: mgm_asset_library_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U mgm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: development
      DATABASE_URL: postgresql://mgm:mgm@localhost:5432/mgm_asset_library_test?schema=public
      MONGO_URL: mongodb://localhost:27017/mgm_asset_library_test
      REDIS_URL: redis://localhost:6379
      KEYCLOAK_ISSUER_URL: http://localhost/realms/mgm
      KEYCLOAK_AUDIENCE: mgm-asset-library
      KEYCLOAK_JWKS_URI: http://localhost/realms/mgm/protocol/openid-connect/certs
      PUBLIC_BASE_URL: http://localhost:4000
      S3_ACCESS_KEY_ID: dummy
      S3_SECRET_ACCESS_KEY: dummy
      S3_BUCKET_ASSETS: assets
      S3_BUCKET_THUMBS: thumbs
      S3_BUCKET_EDITOR_MEDIA: editor
      MEILI_URL: http://localhost:7700

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test -- --coverage --coverageReporters=json-summary --coverageReporters=text
      - run: pnpm build

      - name: Verify openapi.json is up to date
        run: |
          pnpm openapi:export
          if ! git diff --quiet openapi.json; then
            echo "::error::openapi.json is out of date. Run \`pnpm openapi:export\` and commit."
            git --no-pager diff openapi.json | head -200
            exit 1
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  docker:
    name: Build image (no push)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: mgm-asset-library-backend:ci-${{ github.sha }}
